<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FAMILY PLAN - 마이페이지</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div id="header"></div>
<div class="container">
  <div class="mypage-container">
    <h2>마이페이지</h2>
    <div id="successMsg" class="success-msg"></div>
    <div id="errorMsg" class="error-msg"></div>

    <h3 style="font-size:var(--font-size-xl); font-weight:700; margin-bottom:12px;">비밀번호 변경</h3>
    <form id="changePassForm">
      <div class="form-group">
        <label for="currentPass">현재 비밀번호</label>
        <input type="password" id="currentPass" placeholder="현재 비밀번호" required>
      </div>
      <div class="form-group">
        <label for="newPass">새 비밀번호</label>
        <input type="password" id="newPass" placeholder="새 비밀번호" required>
      </div>
      <button type="submit" class="btn btn-primary">비밀번호 변경</button>
    </form>

    <div class="danger-zone">
      <h3>회원 탈퇴</h3>
      <p style="font-size:var(--font-size-sm); color:var(--color-text-secondary); margin-bottom:12px;">
        탈퇴 시 모든 데이터가 삭제됩니다. 그룹 생성자는 탈퇴할 수 없습니다.
      </p>
      <button id="deleteAccountBtn" class="btn btn-danger">회원 탈퇴</button>
    </div>
  </div>
</div>
<script src="/js/app.js"></script>
<script src="/js/mypage.js"></script>
</body>
</html>
