<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FAMILY PLAN - 로그인</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="auth-container">
  <h2>FAMILY PLAN</h2>
  <div id="errorMsg" class="error-msg"></div>
  <form id="loginForm">
    <div class="form-group">
      <label for="loginId">아이디</label>
      <input type="text" id="loginId" placeholder="아이디를 입력하세요" required autofocus>
    </div>
    <div class="form-group">
      <label for="loginPass">비밀번호</label>
      <input type="password" id="loginPass" placeholder="비밀번호를 입력하세요" required>
    </div>
    <button type="submit" class="btn btn-primary" style="width:100%">로그인</button>
  </form>
  <div class="toggle-link">
    계정이 없으신가요? <a href="/signup">회원가입</a>
  </div>
</div>
<script src="/js/app.js"></script>
<script src="/js/auth.js"></script>
</body>
</html>
